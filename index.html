<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام EUX - إدارة الحسابات</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwVWLAlf89839Zvzip6cebQf4XOm9mFgI",
            authDomain: "gooo-a453b.firebaseapp.com",
            projectId: "gooo-a453b",
            storageBucket: "gooo-a453b.firebasestorage.app",
            messagingSenderId: "792941730891",
            appId: "1:792941730891:web:342e6728ab78bbbfd2c1ce",
            measurementId: "G-R2HL2FJ5CR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ordersCol = collection(db, "orders");

        // نظام التحقق من تعدد الأكواد
        window.checkMerchantCode = function() {
            const code = prompt("يرجى إدخال كود الدخول الخاص بك:");
            
            // مصفوفة الأكواد المسموح لها بالدخول
            const allowedCodes = ["55555", "11111"];
            
            if (allowedCodes.includes(code)) {
                sessionStorage.setItem('merchantAccess', 'true'); // تخزين مؤقت للدخول
                goTo('merchantPage');
            } else {
                alert("عذراً! هذا الكود غير مسجل في نظام EUX.");
            }
        };

        // وظيفة التاجر: إرسال طلب
        window.confirmOrder = async function() {
            const shopNum = document.getElementById('shopNumber').value;
            const shopLoc = document.getElementById('shopLocation').value;
            const addresses = Array.from(document.querySelectorAll('.delivery-address')).map(i => i.value).filter(v => v !== "");

            if (!shopNum || !shopLoc || addresses.length === 0) {
                alert("يرجى ملء كافة البيانات");
                return;
            }

            try {
                await addDoc(ordersCol, {
                    shopNum,
                    shopLoc,
                    addresses,
                    status: "waiting",
                    createdAt: new Date()
                });
                alert("✅ تم نشر الطلب بنجاح!");
                resetForm();
                goTo('entryPage');
            } catch (e) { alert("خطأ في الاتصال"); }
        };

        // وظيفة المندوب: قبول الطلب
        window.acceptOrder = async function(orderId) {
            const orderRef = doc(db, "orders", orderId);
            await updateDoc(orderRef, { status: "delivering" });
        };

        // وظيفة المندوب: إنهاء الطلب
        window.finishOrder = async function(orderId) {
            if(confirm("هل تم التوصيل؟")) {
                await deleteDoc(doc(db, "orders", orderId));
            }
        };

        // تحديث حي للطلبات
        onSnapshot(query(ordersCol, orderBy("createdAt", "desc")), (snapshot) => {
            const list = document.getElementById('ordersList');
            list.innerHTML = "";
            snapshot.forEach((doc) => {
                const order = doc.data();
                const id = doc.id;
                let btn = order.status === "waiting" ? 
                    `<button class="btn btn-accept" onclick="acceptOrder('${id}')">قبول الطلب</button>` :
                    `<button class="btn btn-finish" onclick="finishOrder('${id}')">إنهاء الطلب ✅</button>`;
                
                list.innerHTML += `
                    <div class="order-card">
                        <strong>محل: ${order.shopNum}</strong> 
                        <span style="float:left">${order.status === "waiting" ? '⏳' : '🚚'}</span>
                        <p>📍 <a href="${order.shopLoc}" target="_blank">موقع المحل</a></p>
                        <p>🏠 الوجهة: ${order.addresses.join(' | ')}</p>
                        ${btn}
                    </div>
                `;
            });
        });
    </script>

    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; direction: rtl; }
        .screen { display: none; min-height: 100vh; padding: 20px; box-sizing: border-box; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .choice-btn { width: 100%; padding: 18px; margin: 10px 0; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-merchant { background: #1a73e8; color: white; }
        .btn-delivery { background: #34a853; color: white; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { cursor: pointer; border: none; border-radius: 8px; width: 100%; padding: 12px; font-weight: bold; margin-top: 10px; }
        .btn-confirm { background: #fb8c00; color: white; }
        .btn-accept { background: #1a73e8; color: white; }
        .btn-finish { background: #34a853; color: white; }
        .order-card { background: white; padding: 15px; margin-top: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-right: 5px solid #1a73e8; width: 100%; text-align: right; }
        .back { margin-top: 20px; color: #888; cursor: pointer; }
    </style>
</head>
<body>

    <div id="entryPage" class="screen active">
        <div class="card">
            <h1 style="font-size: 45px; margin: 0; color: #1a73e8;">EUX</h1>
            <p style="margin-bottom: 30px; color: #666;">نظام إدارة المناديب</p>
            <button class="choice-btn btn-merchant" onclick="checkMerchantCode()">🏬 دخول التجار</button>
            <button class="choice-btn btn-delivery" onclick="goTo('deliveryPage')">🏍️ دخول المناديب</button>
        </div>
    </div>

    <div id="merchantPage" class="screen">
        <div class="card" style="max-width: 500px;">
            <h2>إنشاء طلب جديد</h2>
            <input type="text" id="shopNumber" placeholder="رقم المحل">
            <input type="text" id="shopLocation" placeholder="موقع المحل (رابط)">
            <div id="addressContainer">
                <input type="text" class="delivery-address" placeholder="عنوان التسليم">
            </div>
            <button class="btn btn-confirm" onclick="confirmOrder()">نشر الطلب</button>
            <div class="back" onclick="goTo('entryPage')">العودة للرئيسية</div>
        </div>
    </div>

    <div id="deliveryPage" class="screen">
        <div style="width: 100%; max-width: 500px;">
            <h2 style="text-align: center;">الطلبات النشطة</h2>
            <div id="ordersList"></div>
            <div class="back" style="text-align: center;" onclick="goTo('entryPage')">العودة للرئيسية</div>
        </div>
    </div>

    <script>
        function goTo(pageId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
        function resetForm() {
            document.getElementById('shopNumber').value = '';
            document.getElementById('shopLocation').value = '';
            document.getElementById('addressContainer').innerHTML = '<input type="text" class="delivery-address" placeholder="عنوان التسليم">';
        }
    </script>
</body>
</html>
