<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام EUX - المتابعة المباشرة</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyAwVWLAlf89839Zvzip6cebQf4XOm9mFgI",
            authDomain: "gooo-a453b.firebaseapp.com",
            projectId: "gooo-a453b",
            storageBucket: "gooo-a453b.firebasestorage.app",
            messagingSenderId: "792941730891",
            appId: "1:792941730891:web:342e6728ab78bbbfd2c1ce",
            measurementId: "G-R2HL2FJ5CR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ordersCol = collection(db, "orders");

        let currentMerchantCode = "";

        window.checkMerchantCode = function() {
            const code = prompt("يرجى إدخال كود التاجر الخاص بك:");
            const allowedCodes = ["55555", "11111"];
            if (allowedCodes.includes(code)) { 
                currentMerchantCode = code;
                goTo('merchantPage'); 
            } else { alert("الكود غير صحيح!"); }
        };

        window.confirmOrder = async function() {
            const shopNum = document.getElementById('shopNumber').value;
            const shopLoc = document.getElementById('shopLocation').value;
            const addresses = Array.from(document.querySelectorAll('.delivery-address')).map(i => i.value).filter(v => v !== "");

            if (!shopNum || !shopLoc || addresses.length === 0) {
                alert("يرجى إكمال البيانات");
                return;
            }

            try {
                await addDoc(ordersCol, {
                    merchantCode: currentMerchantCode,
                    shopNum,
                    shopLoc,
                    addresses,
                    status: "waiting",
                    createdAt: new Date()
                });
                alert("✅ تم نشر الطلب.. يمكنك إضافة طلب آخر الآن");
                resetForm();
            } catch (e) { alert("خطأ في الشبكة"); }
        };

        window.acceptOrder = async function(orderId) {
            await updateDoc(doc(db, "orders", orderId), { status: "delivering" });
            alert("تم قبول الطلب، توجه للمحل الآن 🚚");
        };

        window.finishOrder = async function(orderId) {
            if(confirm("تأكيد الإنهاء: هل تم تسليم الطلب؟ (سيحذف من شاشة التاجر)")) {
                await deleteDoc(doc(db, "orders", orderId));
            }
        };

        onSnapshot(query(ordersCol, orderBy("createdAt", "desc")), (snapshot) => {
            const deliveryList = document.getElementById('ordersList');
            const merchantList = document.getElementById('merchantOrdersMonitor');
            
            deliveryList.innerHTML = "";
            merchantList.innerHTML = "";

            snapshot.forEach((docSnap) => {
                const order = docSnap.data();
                const id = docSnap.id;
                
                // عرض للمندوب
                let deliveryBtn = order.status === "waiting" ? 
                    `<button class="btn btn-accept" onclick="acceptOrder('${id}')">قبول الطلب</button>` :
                    `<button class="btn btn-finish" onclick="finishOrder('${id}')">إتمام التوصيل (إنهاء)</button>`;
                
                deliveryList.innerHTML += `
                    <div class="order-card">
                        <strong>📦 محل رقم: ${order.shopNum}</strong>
                        <p>📍 <a href="${order.shopLoc}" target="_blank">موقع المحل</a></p>
                        <p>🏠 الوجهة: ${order.addresses.join(' | ')}</p>
                        ${deliveryBtn}
                    </div>
                `;

                // عرض للتاجر (طلباته هو فقط)
                if (order.merchantCode === currentMerchantCode) {
                    let statusInfo = order.status === "waiting" ? 
                        `<span class="badge badge-waiting">⏳ في الانتظار...</span>` : 
                        `<span class="badge badge-delivering">🚚 المندوب في الطريق إليك</span>`;

                    merchantList.innerHTML += `
                        <div class="monitor-item">
                            <div>
                                <strong>محل ${order.shopNum}</strong><br>
                                <small>${order.addresses[0]}</small>
                            </div>
                            ${statusInfo}
                        </div>
                    `;
                }
            });
        });
    </script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; direction: rtl; }
        .screen { display: none; min-height: 100vh; padding: 20px; box-sizing: border-box; flex-direction: column; align-items: center; }
        .active { display: flex; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); width: 100%; max-width: 450px; text-align: center; margin-bottom: 20px; }
        h1 { color: #1a73e8; font-size: 45px; margin: 10px 0; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { cursor: pointer; border: none; border-radius: 10px; width: 100%; padding: 15px; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .btn-main { background: #1a73e8; color: white; }
        .btn-delivery { background: #34a853; color: white; }
        .btn-confirm { background: #fb8c00; color: white; }
        .btn-accept { background: #1a73e8; color: white; }
        .btn-finish { background: #d32f2f; color: white; }
        
        .order-card { background: white; padding: 15px; margin-top: 12px; border-radius: 12px; border-right: 6px solid #1a73e8; width: 100%; text-align: right; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .monitor-card { background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 450px; text-align: right; border: 1px solid #e0e0e0; }
        .monitor-item { border-bottom: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
        .monitor-item:last-child { border: none; }
        
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-waiting { background: #fff3cd; color: #856404; animation: blink 1.5s infinite; }
        .badge-delivering { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        
        @keyframes blink { 50% { opacity: 0.6; } }
        .back { margin-top: 25px; color: #666; cursor: pointer; font-size: 14px; text-decoration: underline; }
    </style>
</head>
<body>

    <div id="entryPage" class="screen active" style="justify-content: center;">
        <div class="card">
            <h1>EUX</h1>
            <p style="color: #666;">نظام الربط اللحظي بين التاجر والمندوب</p>
            <button class="btn btn-main" style="margin-top: 20px;" onclick="checkMerchantCode()">🏬 دخول لوحة التجار</button>
            <button class="btn btn-delivery" onclick="goTo('deliveryPage')">🏍️ دخول لوحة المناديب</button>
        </div>
    </div>

    <div id="merchantPage" class="screen">
        <div class="card">
            <h2 style="margin: 0 0 20px 0;">إنشاء طلب جديد</h2>
            <input type="text" id="shopNumber" placeholder="رقم المحل">
            <input type="text" id="shopLocation" placeholder="موقع المحل (رابط الخريطة)">
            <div id="addressContainer"><input type="text" class="delivery-address" placeholder="عنوان الزبون"></div>
            <button class="btn btn-confirm" onclick="confirmOrder()">نشر الطلب الآن</button>
            <div class="back" onclick="location.reload()">تسجيل الخروج</div>
        </div>
        
        <div class="monitor-card">
            <h3 style="margin-top:0; color: #333;">📊 حالة طلباتك الآن:</h3>
            <div id="merchantOrdersMonitor">لا توجد طلبات جارية حالياً</div>
        </div>
    </div>

    <div id="deliveryPage" class="screen">
        <div style="width: 100%; max-width: 500px;">
            <h2 style="text-align: center;">الطلبات المتاحة للتوصيل</h2>
            <div id="ordersList">جاري التحميل...</div>
            <div class="back" style="text-align: center; display: block;" onclick="goTo('entryPage')">العودة للرئيسية</div>
        </div>
    </div>

    <script>
        function goTo(pageId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
        function resetForm() {
            document.getElementById('shopNumber').value = '';
            document.getElementById('shopLocation').value = '';
            document.getElementById('addressContainer').innerHTML = '<input type="text" class="delivery-address" placeholder="عنوان الزبون">';
        }
    </script>
</body>
</html>
