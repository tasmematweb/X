<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واجهة مبرمج محترف - طلب خدمة برمجية</title>
    
    <meta property="og:title" content="تصميمات ويب - نحول أفكارك الرقمية إلى واقع">
    <meta property="og:description" content="نقدم حلولاً برمجية متكاملة تجمع بين التصميم الإبداعي والأداء العالي.">

    <meta property="og:url" content="https://tasmematweb.netlify.app">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        :root { --white: #ffffff; --purple-primary: #6b46c1; --purple-secondary: #9f7aea; --purple-dark: #4c1d95; --purple-light: #e2e8f0; --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); --shadow-lg: 0 35px 60px -12px rgba(0, 0, 0, 0.2); }
        
        .weather-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; background: transparent; }
        .drop { position: absolute; background: linear-gradient(to bottom, transparent, #9f7aea); width: 2px; height: 80px; top: -100px; animation: fall linear infinite; filter: blur(1px) drop-shadow(0 0 8px #9f7aea); opacity: 0.6; }
        @keyframes fall { to { transform: translateY(110vh); } }

        body { font-family: 'Cairo', sans-serif; line-height: 1.7; color: #2d3748; background: var(--white); overflow-x: hidden; padding-top: 100px; }
        
        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 10; }
        
        header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); padding: 1rem 0; box-shadow: var(--shadow); position: fixed; width: 100%; top: 0; left: 0; right: 0; z-index: 1000; border-bottom: 1px solid var(--purple-light); }
        .header-content { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1300px; margin: 0 auto; padding: 0 20px; }
        
        /* التصميم الجديد للنافذة العلوية (اللوجو) */
        .logo { 
            font-size: 1.5rem; 
            font-weight: 900; 
            color: var(--white);
            background: linear-gradient(135deg, var(--purple-primary), var(--purple-secondary));
            padding: 12px 30px;
            /* شكل بالوني احترافي بزويا متباينة */
            border-radius: 60px 20px 60px 20px;
            box-shadow: 0 10px 20px rgba(107, 70, 193, 0.3);
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .logo:hover {
            transform: scale(1.05) rotate(-2deg);
            border-radius: 20px 60px 20px 60px;
        }

        nav ul { display: flex; list-style: none; gap: 40px; }
        nav a { text-decoration: none; color: #4a5568; font-weight: 600; font-size: 1.1rem; position: relative; transition: all 0.3s ease; }
        
        .featured-image-section { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 120px 20px 40px 20px;
            background-color: var(--white); 
            margin-top: 20px;
        }
        .featured-image-section img { max-width: 100%; max-height: 500px; border-radius: 25px; box-shadow: var(--shadow-lg); transition: transform 0.3s ease; }

        .hero { min-height: 90vh; display: flex; align-items: center; justify-content: center; position: relative; background: linear-gradient(135deg, rgba(255,255,255,0.8) 0%, rgba(226,232,240,0.6) 100%); overflow: hidden; width: 100%; }
        .hero-content { position: relative; z-index: 2; text-align: center; max-width: 1100px; margin: 0 auto; width: 100%; padding-bottom: 40px; }
        .hero h1 { 
            font-size: clamp(2.8rem, 6vw, 5.5rem); 
            font-weight: 900; 
            background: linear-gradient(135deg, var(--purple-primary), var(--purple-secondary)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            background-clip: text; 
            margin-bottom: 2rem; 
            line-height: 1.15;
            padding: 0 20px; 
            word-break: keep-all;
            white-space: normal;
        }
        .hero p { font-size: 1.4rem; color: #4a5568; margin-bottom: 3rem; max-width: 700px; margin: 0 auto 3rem; }
        .cta-buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 50px; }
        .cta-primary, .submit-btn { background: linear-gradient(135deg, var(--purple-primary), var(--purple-secondary)); color: var(--white); padding: 18px 45px; border-radius: 50px; text-decoration: none; font-size: 1.1rem; font-weight: 700; box-shadow: var(--shadow-lg); transition: all 0.4s ease; border: none; cursor: pointer; }
