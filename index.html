<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام EUX المتكامل</title>
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'EUX System','short_name':'EUX','start_url':'.','display':'standalone','background_color':'#ffffff','theme_color':'#1a73e8','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/1162/1162250.png','sizes':'512x512','type':'image/png'}]}">
    <meta name="mobile-web-app-capable" content="yes">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwVWLAlf89839Zvzip6cebQf4XOm9mFgI",
            authDomain: "gooo-a453b.firebaseapp.com",
            projectId: "gooo-a453b",
            storageBucket: "gooo-a453b.firebasestorage.app",
            messagingSenderId: "792941730891",
            appId: "1:792941730891:web:342e6728ab78bbbfd2c1ce",
            measurementId: "G-R2HL2FJ5CR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ordersCol = collection(db, "orders");
        const usersCol = collection(db, "users");

        let currentUserCode = localStorage.getItem('EUX_User_Code') || "";
        let userRole = localStorage.getItem('EUX_Role') || "";
        let lastWaitingCount = -1;
        let wakeLock = null;

        // وظيفة لتوليد صوت تنبيه مزعج برمجياً (بدون روابط خارجية)
        function playAlarmSound() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const duration = 6000; // 6 ثواني
            const startTime = audioCtx.currentTime;

            // إنشاء مذبذب للصوت
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sawtooth'; // صوت حاد ومزعج
            oscillator.frequency.setValueAtTime(880, startTime); // تردد مرتفع
            oscillator.frequency.exponentialRampToValueAtTime(440, startTime + 0.5);
            oscillator.loop = true;

            // جعل الصوت يقطع (Beep Beep) لزيادة الإزعاج
            gainNode.gain.setValueAtTime(1, startTime);
            for(let i = 0; i < 6; i+= 0.5) {
                gainNode.gain.setValueAtTime(1, startTime + i);
                gainNode.gain.setValueAtTime(0, startTime + i + 0.25);
            }

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(startTime + 6); // يتوقف بعد 6 ثواني
        }

        window.enableNotifications = async function() {
            if (!("Notification" in window)) return alert("متصفحك لا يدعم الإشعارات");
            const permission = await Notification.requestPermission();
            if (permission === "granted") {
                playAlarmSound();
                alert("تم تفعيل التنبيه بنجاح");
                if(userRole === 'delivery') requestWakeLock();
            }
        };

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }

        function sendNotify(title, body) {
            if (Notification.permission === "granted") {
                playAlarmSound();
                new Notification(title, {
                    body: body,
                    icon: "https://cdn-icons-png.flaticon.com/512/1162/1162250.png",
                    requireInteraction: true
                });
                if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]);
            }
        }

        window.loginProcess = async function(type) {
            const inputId = type === 'merchant' ? 'merchantCodeInput' : 'deliveryCodeInput';
            const code = document.getElementById(inputId).value;
            if (code === "011483") { setSession(code, 'admin', 'adminPage'); return; }
            const userDoc = await getDoc(doc(db, "users", code));
            if (userDoc.exists()) {
                const userData = userDoc.data();
                if (userData.role === type) setSession(code, type, type === 'merchant' ? 'merchantPage' : 'deliveryPage');
                else alert("خطأ في نوع الكود");
            } else alert("كود غير صحيح");
        };

        async function setSession(code, role, page) {
            currentUserCode = code; userRole = role;
            localStorage.setItem('EUX_User_Code', code);
            localStorage.setItem('EUX_Role', role);
            goTo(page);
            if(role === 'merchant') loadMerchantData(code);
            if(role === 'delivery') requestWakeLock();
        }

        window.logout = function() { localStorage.clear(); location.reload(); };

        async function loadMerchantData(code) {
            const userDoc = await getDoc(doc(db, "users", code));
            if(userDoc.exists()) {
                const data = userDoc.data();
                document.getElementById('shopNumber').value = data.phone || "";
                document.getElementById('shopLocation').value = data.location || "";
            }
        }

        window.confirmOrder = async function() {
            const shopNum = document.getElementById('shopNumber').value;
            const shopLoc = document.getElementById('shopLocation').value;
            const addresses = Array.from(document.querySelectorAll('.delivery-address')).map(i => i.value).filter(v => v !== "");
            if (!shopNum || addresses.length === 0) return alert("أكمل البيانات");
            await addDoc(ordersCol, {
                merchantCode: currentUserCode, deliveryCode: "", 
                shopNum, shopLoc, addresses, status: "waiting", createdAt: new Date()
            });
            document.getElementById('addressContainer').innerHTML = '<input type="text" class="delivery-address" placeholder="عنوان الزبون">';
            alert("تم النشر");
        };

        window.acceptOrder = async function(id) {
            await updateDoc(doc(db, "orders", id), { status: "delivering", deliveryCode: currentUserCode });
        };

        window.finishOrder = async function(id) {
            if(confirm("تم التسليم؟")) await updateDoc(doc(db, "orders", id), { status: "completed" });
        };

        onSnapshot(query(ordersCol, orderBy("createdAt", "desc")), (snapshot) => {
            const dList = document.getElementById('ordersList');
            const mList = document.getElementById('merchantOrdersMonitor');
            const aList = document.getElementById('adminOrdersMonitor');
            const archList = document.getElementById('archivedOrdersList');
            const completedCount = document.getElementById('completedCount');
            
            if(dList) dList.innerHTML = ""; if(mList) mList.innerHTML = ""; if(aList) aList.innerHTML = ""; if(archList) archList.innerHTML = "";
            let count = 0; let currentWaiting = 0;

            snapshot.forEach((docSnap) => {
                const order = docSnap.data();
                const id = docSnap.id;
                const addrHTML = order.addresses.map(a => a.startsWith('http') ? `• <a href="${a}" target="_blank">📍 خريطة</a>` : `• ${a}`).join('<br>');
                
                if (order.status === "completed") {
                    count++;
                    if(archList) archList.innerHTML += `<div class="monitor-item" style="display:block;">
                        <strong>🏬 التاجر: ${order.merchantCode} (${order.shopNum})</strong><br>
                        <strong>🏍️ المندوب: ${order.deliveryCode}</strong>
                    </div>`;
                } else {
                    if (order.status === "waiting") {
                        currentWaiting++;
                        if(dList) dList.innerHTML += `<div class="order-card"><strong>📞 هاتف: ${order.shopNum}</strong><br><a href="${order.shopLoc}" target="_blank">📍 موقع المحل</a><p>${addrHTML}</p><button class="btn btn-accept-green" onclick="acceptOrder('${id}')">قبول</button></div>`;
                    } else if (order.status === "delivering" && order.deliveryCode === currentUserCode) {
                        if(dList) dList.innerHTML += `<div class="order-card"><strong>📞 هاتف: ${order.shopNum}</strong><br><p>${addrHTML}</p><button class="btn btn-finish-red" onclick="finishOrder('${id}')">إنهاء</button></div>`;
                    }
                    if(mList && order.merchantCode === currentUserCode) mList.innerHTML += `<div class="monitor-item"><span>${order.status}</span></div>`;
                    if(aList) aList.innerHTML += `<div class="monitor-item"><span>${order.shopNum} - ${order.status}</span></div>`;
                }
            });

            if (userRole === 'delivery' && lastWaitingCount !== -1 && currentWaiting > lastWaitingCount) {
                sendNotify("طلب جديد متاح! 🏍️", "يوجد طلب جديد بانتظارك.");
            }
            lastWaitingCount = currentWaiting;
            if(completedCount) completedCount.innerText = count;
        });

        window.onload = function() {
            if (userRole === 'admin') goTo('adminPage');
            else if (userRole === 'merchant') { goTo('merchantPage'); loadMerchantData(currentUserCode); }
            else if (userRole === 'delivery') { goTo('deliveryPage'); requestWakeLock(); }
        };

        window.showModal = function(id) { document.getElementById(id).style.display = 'flex'; };
        window.closeModal = function(id) { document.getElementById(id).style.display = 'none'; };
        function goTo(pageId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
    </script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; direction: rtl; }
        .top-bar { background: #1a73e8; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; position: sticky; top: 0; z-index: 1000; }
        .screen { display: none; padding: 20px; flex-direction: column; align-items: center; }
        .active { display: flex; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; text-align: center; }
        .btn { cursor: pointer; border: none; border-radius: 10px; width: 100%; padding: 12px; font-weight: bold; margin-top: 10px; }
        .btn-main { background: #1a73e8; color: white; }
        .btn-delivery { background: #34a853; color: white; }
        .btn-accept-green { background: #28a745; color: white; }
        .btn-finish-red { background: #dc3545; color: white; }
        .btn-notify { background: #673ab7; color: white; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .monitor-item { border-bottom: 1px solid #eee; padding: 10px; text-align: right; }
        .order-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-right: 5px solid #34a853; width: 100%; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 80%; max-width: 300px; }
    </style>
</head>
<body>

    <div class="top-bar">نظام EUX للتوصيل الذكي</div>

    <div id="entryPage" class="screen active" style="margin-top: 50px;">
        <div class="card">
            <h1>EUX</h1>
            <button class="btn btn-main" onclick="showModal('loginModal')">🏬 دخول التاجر</button>
            <button class="btn btn-delivery" onclick="showModal('deliveryLoginModal')">🏍️ دخول المندوب</button>
        </div>
    </div>

    <div id="loginModal" class="modal-overlay" onclick="if(event.target == this) closeModal('loginModal')">
        <div class="modal-content">
            <input type="password" id="merchantCodeInput" placeholder="كود التاجر">
            <button class="btn btn-main" onclick="loginProcess('merchant')">دخول</button>
        </div>
    </div>

    <div id="deliveryLoginModal" class="modal-overlay" onclick="if(event.target == this) closeModal('deliveryLoginModal')">
        <div class="modal-content">
            <input type="password" id="deliveryCodeInput" placeholder="كود المندوب">
            <button class="btn btn-delivery" onclick="loginProcess('delivery')">دخول</button>
        </div>
    </div>

    <div id="merchantPage" class="screen">
        <div class="card">
            <h3>طلب جديد</h3>
            <input type="tel" id="shopNumber" readonly>
            <input type="text" id="shopLocation" readonly>
            <div id="addressContainer"><input type="text" class="delivery-address" placeholder="عنوان الزبون"></div>
            <button class="btn btn-confirm" style="background:#fb8c00; color:white;" onclick="confirmOrder()">نشر الطلب</button>
            <div style="cursor:pointer; margin-top:15px; color:#888" onclick="logout()">خروج</div>
        </div>
        <div id="merchantOrdersMonitor" class="card"></div>
    </div>

    <div id="deliveryPage" class="screen">
        <div class="card">
            <button class="btn btn-notify" onclick="enableNotifications()">⚡ تفعيل جرس التنبيه القوي</button>
            <button class="btn btn-main" onclick="logout()" style="background:#666">خروج</button>
        </div>
        <div id="ordersList" style="width:100%; max-width:400px;"></div>
    </div>

    <div id="adminPage" class="screen">
        <div class="card">
            <h3>سجل المكتملة: <span id="completedCount">0</span></h3>
            <div id="archivedOrdersList" style="max-height:200px; overflow-y:auto; font-size:12px;"></div>
            <hr>
            <button class="btn btn-main" onclick="logout()">خروج</button>
        </div>
        <div id="adminOrdersMonitor" class="card"><h4>طلبات جارية</h4></div>
    </div>

</body>
</html>
