<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام EUX - التوصيل الذكي</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // إعدادات Firebase الخاصة بمشروعك
        const firebaseConfig = {
            apiKey: "AIzaSyAwVWLAlf89839Zvzip6cebQf4XOm9mFgI",
            authDomain: "gooo-a453b.firebaseapp.com",
            projectId: "gooo-a453b",
            storageBucket: "gooo-a453b.firebasestorage.app",
            messagingSenderId: "792941730891",
            appId: "1:792941730891:web:342e6728ab78bbbfd2c1ce",
            measurementId: "G-R2HL2FJ5CR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ordersCol = collection(db, "orders");

        // وظيفة التحقق من كود التاجر
        window.checkMerchantCode = function() {
            const code = prompt("يرجى إدخال كود الدخول الخاص بالتاجر:");
            if (code === "00000") {
                goTo('merchantPage');
            } else {
                alert("الكود خاطئ! لا يمكنك الدخول.");
            }
        };

        // وظيفة التاجر: إرسال طلب
        window.confirmOrder = async function() {
            const shopNum = document.getElementById('shopNumber').value;
            const shopLoc = document.getElementById('shopLocation').value;
            const addresses = Array.from(document.querySelectorAll('.delivery-address')).map(i => i.value).filter(v => v !== "");

            if (!shopNum || !shopLoc || addresses.length === 0) {
                alert("يرجى ملء كافة البيانات");
                return;
            }

            try {
                await addDoc(ordersCol, {
                    shopNum,
                    shopLoc,
                    addresses,
                    status: "waiting",
                    createdAt: new Date()
                });
                alert("✅ تم نشر الطلب في نظام EUX بنجاح!");
                resetForm();
                goTo('entryPage');
            } catch (e) { alert("خطأ في الاتصال بالسحابة"); }
        };

        // وظيفة المندوب: قبول الطلب
        window.acceptOrder = async function(orderId) {
            const orderRef = doc(db, "orders", orderId);
            await updateDoc(orderRef, { status: "delivering" });
            alert("🚚 تم قبول الطلب من قبل مندوب EUX");
        };

        // وظيفة المندوب: إنهاء الطلب
        window.finishOrder = async function(orderId) {
            if(confirm("هل تم توصيل الطلب بنجاح؟")) {
                await deleteDoc(doc(db, "orders", orderId));
                alert("✅ تم إتمام المهمة.");
            }
        };

        // تحديث القائمة للمندوبين
        onSnapshot(query(ordersCol, orderBy("createdAt", "desc")), (snapshot) => {
            const list = document.getElementById('ordersList');
            list.innerHTML = "";
            snapshot.forEach((doc) => {
                const order = doc.data();
                const id = doc.id;
                let actionBtn = "";
                let statusText = "";
                
                if (order.status === "waiting") {
                    statusText = "<span style='color:orange'>⏳ متاح للقبول</span>";
                    actionBtn = `<button class="btn btn-accept" onclick="acceptOrder('${id}')">قبول الطلب</button>`;
                } else {
                    statusText = "<span style='color:blue'>🚚 جاري التوصيل الآن</span>";
                    actionBtn = `<button class="btn btn-finish" onclick="finishOrder('${id}')">تم التوصيل</button>`;
                }

                list.innerHTML += `
                    <div class="order-card">
                        <div style="display:flex; justify-content:space-between">
                            <strong>محل: ${order.shopNum}</strong>
                            ${statusText}
                        </div>
                        <p>📍 <a href="${order.shopLoc}" target="_blank">موقع المحل على الخريطة</a></p>
                        <p>🏠 الوجهة: ${order.addresses.join(' | ')}</p>
                        ${actionBtn}
                    </div>
                `;
            });
        });
    </script>

    <style>
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; margin: 0; direction: rtl; }
        .screen { display: none; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .active { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* صفحة الدخول */
        .entry-card { background: white; padding: 40px 20px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; border-top: 8px solid #1a73e8; }
        .choice-btn { width: 100%; padding: 18px; margin: 12px 0; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-merchant { background: #1a73e8; color: white; }
        .btn-delivery { background: #34a853; color: white; }
        
        /* النماذج والطلبات */
        .content-card { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1, h2 { color: #2c3e50; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; background: #fafafa; }
        .btn { cursor: pointer; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; width: 100%; padding: 14px; transition: 0.2s; }
        .btn-confirm { background: #fb8c00; color: white; }
        .btn-accept { background: #1a73e8; color: white; }
        .btn-finish { background: #34a853; color: white; }
        
        .order-card { background: #fff; border-right: 6px solid #1a73e8; padding: 18px; margin-top: 15px; border-radius: 12px; text-align: right; box-shadow: 0 3px 10px rgba(0,0,0,0.05); width: 100%; }
        .back-link { margin-top: 25px; color: #888; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

    <div id="entryPage" class="screen active">
        <div class="entry-card">
            <h1 style="letter-spacing: 3px; font-size: 40px; margin-bottom: 10px;">EUX</h1>
            <p style="color: #666; margin-bottom: 30px;">نظام إدارة الطلبات والمناديب</p>
            <button class="choice-btn btn-merchant" onclick="window.checkMerchantCode()">🏬 محل التاجر</button>
            <button class="choice-btn btn-delivery" onclick="goTo('deliveryPage')">🏍️ أنا المندوب</button>
        </div>
    </div>

    <div id="merchantPage" class="screen">
        <div class="content-card">
            <h2>إضافة طلب جديد لـ EUX</h2>
            <input type="text" id="shopNumber" placeholder="رقم المحل">
            <input type="text" id="shopLocation" placeholder="رابط موقع المحل (Google Maps)">
            <div id="addressContainer">
                <input type="text" class="delivery-address" placeholder="عنوان الزبون">
            </div>
            <button class="btn btn-confirm" onclick="window.confirmOrder()">تأكيد ونشر الطلب</button>
            <p class="back-link" onclick="goTo('entryPage')">↩ العودة للرئيسية</p>
        </div>
    </div>

    <div id="deliveryPage" class="screen">
        <div style="width: 100%; max-width: 500px;">
            <h2 style="text-align: center;">لوحة مناديب EUX</h2>
            <div id="ordersList">جاري جلب الطلبات...</div>
            <p class="back-link" style="text-align: center;" onclick="goTo('entryPage')">↩ العودة للرئيسية</p>
        </div>
    </div>

    <script>
        function goTo(pageId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function resetForm() {
            document.getElementById('shopNumber').value = '';
            document.getElementById('shopLocation').value = '';
            document.getElementById('addressContainer').innerHTML = '<input type="text" class="delivery-address" placeholder="عنوان الزبون">';
        }
    </script>
</body>
</html>
