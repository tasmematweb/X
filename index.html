<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام EUX المتطور</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwVWLAlf89839Zvzip6cebQf4XOm9mFgI",
            authDomain: "gooo-a453b.firebaseapp.com",
            projectId: "gooo-a453b",
            storageBucket: "gooo-a453b.firebasestorage.app",
            messagingSenderId: "792941730891",
            appId: "1:792941730891:web:342e6728ab78bbbfd2c1ce",
            measurementId: "G-R2HL2FJ5CR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ordersCol = collection(db, "orders");

        window.checkMerchantCode = function() {
            const code = prompt("يرجى إدخال كود التاجر:");
            const allowedCodes = ["55555", "11111"];
            if (allowedCodes.includes(code)) { goTo('merchantPage'); } 
            else { alert("الكود خاطئ!"); }
        };

        // وظيفة التاجر: إرسال طلب والبقاء في الصفحة
        window.confirmOrder = async function() {
            const shopNum = document.getElementById('shopNumber').value;
            const shopLoc = document.getElementById('shopLocation').value;
            const addresses = Array.from(document.querySelectorAll('.delivery-address')).map(i => i.value).filter(v => v !== "");

            if (!shopNum || !shopLoc || addresses.length === 0) {
                alert("يرجى ملء كافة البيانات");
                return;
            }

            try {
                await addDoc(ordersCol, {
                    shopNum,
                    shopLoc,
                    addresses,
                    status: "waiting",
                    createdAt: new Date()
                });
                alert("✅ تم نشر الطلب بنجاح!");
                resetForm(); // يفرغ الخانات ويبقى في الصفحة
            } catch (e) { alert("خطأ في الاتصال"); }
        };

        // وظيفة المندوب
        window.acceptOrder = async function(orderId) {
            await updateDoc(doc(db, "orders", orderId), { status: "delivering" });
        };

        window.finishOrder = async function(orderId) {
            if(confirm("هل تم التوصيل نهائياً؟ سيتم حذف الطلب من النظام.")) {
                await deleteDoc(doc(db, "orders", orderId));
            }
        };

        // تحديث الطلبات (للتجار والمناديب)
        onSnapshot(query(ordersCol, orderBy("createdAt", "desc")), (snapshot) => {
            const deliveryList = document.getElementById('ordersList');
            const merchantList = document.getElementById('merchantOrdersMonitor');
            deliveryList.innerHTML = "";
            merchantList.innerHTML = "";

            snapshot.forEach((doc) => {
                const order = doc.data();
                const id = doc.id;
                
                // قالب الطلب للمندوب
                let deliveryBtn = order.status === "waiting" ? 
                    `<button class="btn btn-accept" onclick="acceptOrder('${id}')">قبول الطلب</button>` :
                    `<button class="btn btn-finish" onclick="finishOrder('${id}')">تم التوصيل (إنهاء)</button>`;
                
                deliveryList.innerHTML += `
                    <div class="order-card">
                        <strong>محل: ${order.shopNum}</strong>
                        <p>📍 <a href="${order.shopLoc}" target="_blank">موقع المحل</a></p>
                        <p>🏠 الوجهة: ${order.addresses.join(' | ')}</p>
                        ${deliveryBtn}
                    </div>
                `;

                // قالب المراقبة للتاجر
                let statusBadge = order.status === "waiting" ? 
                    `<span class="badge badge-waiting">⏳ في الانتظار</span>` : 
                    `<span class="badge badge-delivering">🚚 استلمه مندوب</span>`;

                merchantList.innerHTML += `
                    <div class="monitor-item">
                        <span>محل ${order.shopNum} - ${order.addresses[0]}</span>
                        ${statusBadge}
                    </div>
                `;
            });
        });
    </script>

    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; direction: rtl; }
        .screen { display: none; min-height: 100vh; padding: 20px; box-sizing: border-box; flex-direction: column; align-items: center; }
        .active { display: flex; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; margin-bottom: 20px; }
        .choice-btn { width: 100%; padding: 20px; margin: 10px 0; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-merchant { background: #1a73e8; color: white; }
        .btn-delivery { background: #34a853; color: white; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { cursor: pointer; border: none; border-radius: 8px; width: 100%; padding: 12px; font-weight: bold; margin-top: 10px; }
        .btn-confirm { background: #fb8c00; color: white; }
        .btn-accept { background: #1a73e8; color: white; }
        .btn-finish { background: #34a853; color: white; }
        
        /* كروت المندوب */
        .order-card { background: white; padding: 15px; margin-top: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-right: 5px solid #1a73e8; width: 100%; text-align: right; }
        
        /* لوحة مراقبة التاجر */
        .monitor-card { background: #eef2f7; padding: 15px; border-radius: 12px; width: 100%; max-width: 450px; text-align: right; }
        .monitor-item { background: white; padding: 10px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; border: 1px solid #ddd; }
        .badge { padding: 4px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .badge-waiting { background: #fff3cd; color: #856404; }
        .badge-delivering { background: #d4edda; color: #155724; }
        .back { margin-top: 20px; color: #888; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div id="entryPage" class="screen active" style="justify-content: center;">
        <div class="card">
            <h1 style="font-size: 50px; margin: 0; color: #1a73e8;">EUX</h1>
            <p style="margin-bottom: 30px; color: #666;">إدارة الطلبات اللحظية</p>
            <button class="choice-btn btn-merchant" onclick="checkMerchantCode()">🏬 دخول التجار</button>
            <button class="choice-btn btn-delivery" onclick="goTo('deliveryPage')">🏍️ دخول المناديب</button>
        </div>
    </div>

    <div id="merchantPage" class="screen">
        <div class="card">
            <h2>إنشاء طلب جديد</h2>
            <input type="text" id="shopNumber" placeholder="رقم المحل">
            <input type="text" id="shopLocation" placeholder="موقع المحل (رابط)">
            <div id="addressContainer"><input type="text" class="delivery-address" placeholder="عنوان الزبون"></div>
            <button class="btn btn-confirm" onclick="confirmOrder()">نشر الطلب الآن</button>
            <div class="back" onclick="goTo('entryPage')">خروج للرئيسية</div>
        </div>
        
        <div class="monitor-card">
            <h3 style="margin-top:0">📊 مراقبة طلباتك الحالية</h3>
            <div id="merchantOrdersMonitor">لا توجد طلبات جارية</div>
        </div>
    </div>

    <div id="deliveryPage" class="screen">
        <div style="width: 100%; max-width: 500px;">
            <h2 style="text-align: center;">الطلبات المتاحة للمناديب</h2>
            <div id="ordersList"></div>
            <div class="back" style="text-align: center; display: block;" onclick="goTo('entryPage')">العودة للرئيسية</div>
        </div>
    </div>

    <script>
        function goTo(pageId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
        function resetForm() {
            document.getElementById('shopNumber').value = '';
            document.getElementById('shopLocation').value = '';
            document.getElementById('addressContainer').innerHTML = '<input type="text" class="delivery-address" placeholder="عنوان الزبون">';
        }
    </script>
</body>
</html>
