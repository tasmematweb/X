<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - الأوردرات</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #eef2f3; padding: 20px; text-align: center; }
        .order-card { background: white; border: 1px solid #ddd; padding: 15px; margin: 10px auto; width: 80%; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-accept { background-color: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .btn-cancel { background-color: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .status-tag { font-weight: bold; color: #007bff; }
    </style>
</head>
<body>

    <h2>قائمة الأوردرات الواردة</h2>
    <div id="ordersContainer"></div>
    <br>
    <button onclick="window.location.href='index.html'">العودة للصفحة الرئيسية</button>

    <script>
        function displayOrders() {
            const container = document.getElementById('ordersContainer');
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            container.innerHTML = '';

            if (orders.length === 0) {
                container.innerHTML = '<p>لا توجد أوردرات حالياً.</p>';
                return;
            }

            orders.forEach(order => {
                const div = document.createElement('div');
                div.className = 'order-card';
                div.innerHTML = `
                    <p><strong>عنوان الاستلام:</strong> ${order.pickup}</p>
                    <p><strong>عنوان التسليم:</strong> ${order.delivery}</p>
                    <p class="status-tag">الحالة: ${order.status}</p>
                    ${order.status === 'قيد الانتظار' 
                        ? `<button class="btn-accept" onclick="acceptOrder(${order.id})">قبول الأوردر</button>` 
                        : `<button class="btn-cancel" onclick="deleteOrder(${order.id})">إلغاء (حذف)</button>`
                    }
                `;
                container.appendChild(div);
            });
        }

        // وظيفة قبول الأوردر
        window.acceptOrder = (id) => {
            let orders = JSON.parse(localStorage.getItem('orders'));
            orders = orders.map(order => {
                if(order.id === id) order.status = 'تم القبول';
                return order;
            });
            localStorage.setItem('orders', JSON.stringify(orders));
            displayOrders();
        };

        // وظيفة إلغاء الأوردر (حذفه نهائياً)
        window.deleteOrder = (id) => {
            let orders = JSON.parse(localStorage.getItem('orders'));
            orders = orders.filter(order => order.id !== id);
            localStorage.setItem('orders', JSON.stringify(orders));
            displayOrders();
        };

        // تحديث القائمة عند فتح الصفحة
        displayOrders();
    </script>
</body>
</html>
