<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام EUX المتكامل</title>
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'EUX System','short_name':'EUX','start_url':'.','display':'standalone','background_color':'#ffffff','theme_color':'#1a73e8','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/1162/1162250.png','sizes':'512x512','type':'image/png'}]}">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwVWLAlf89839Zvzip6cebQf4XOm9mFgI",
            authDomain: "gooo-a453b.firebaseapp.com",
            projectId: "gooo-a453b",
            storageBucket: "gooo-a453b.firebasestorage.app",
            messagingSenderId: "792941730891",
            appId: "1:792941730891:web:342e6728ab78bbbfd2c1ce",
            measurementId: "G-R2HL2FJ5CR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ordersCol = collection(db, "orders");
        const usersCol = collection(db, "users");

        let currentUserCode = localStorage.getItem('EUX_User_Code') || "";
        let userRole = localStorage.getItem('EUX_Role') || "";
        let map, marker, wakeLock = null;
        let lastWaitingCount = -1;

        const notificationSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');

        // --- نظام الـ Service Worker المدمج للعمل في الخلفية ---
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                self.addEventListener('notificationclick', e => {
                    e.notification.close();
                    e.waitUntil(clients.openWindow('/'));
                });
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }

        // دالة منع خمول الهاتف
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) { console.log("WakeLock Error:", err.message); }
        }

        window.enableNotifications = async function() {
            if (!("Notification" in window)) return alert("متصفحك لا يدعم الإشعارات");
            const permission = await Notification.requestPermission();
            if (permission === "granted") {
                notificationSound.play().catch(() => {});
                sendNotify("EUX System", "نظام التنبيهات نشط الآن في الخلفية");
                if(userRole === 'delivery') requestWakeLock();
            } else {
                alert("يجب السماح بالإشعارات من إعدادات المتصفح.");
            }
        };

        function sendNotify(title, body) {
            if (Notification.permission === "granted") {
                // تشغيل الصوت
                notificationSound.currentTime = 0;
                notificationSound.play().catch(e => console.log("Audio play failed"));

                // إرسال الإشعار عبر نظام التشغيل (يظهر في الخلفية)
                navigator.serviceWorker.ready.then(registration => {
                    registration.showNotification(title, {
                        body: body,
                        icon: "https://cdn-icons-png.flaticon.com/512/1162/1162250.png",
                        badge: "https://cdn-icons-png.flaticon.com/512/1162/1162250.png",
                        vibrate: [500, 200, 500],
                        tag: "new-order",
                        renotify: true,
                        requireInteraction: true
                    });
                });
            }
        }

        window.loginProcess = async function(type) {
            const inputId = type === 'merchant' ? 'merchantCodeInput' : 'deliveryCodeInput';
            const code = document.getElementById(inputId).value;
            if (code === "011483") { setSession(code, 'admin', 'adminPage'); return; }
            const userDoc = await getDoc(doc(db, "users", code));
            if (userDoc.exists()) {
                const userData = userDoc.data();
                if (userData.role === type) {
                    setSession(code, type, type === 'merchant' ? 'merchantPage' : 'deliveryPage');
                } else { alert("هذا الكود غير مسجل لهذا النوع!"); }
            } else { alert("الكود خطأ أو غير مسجل!"); }
        };

        async function setSession(code, role, page) {
            currentUserCode = code; userRole = role;
            localStorage.setItem('EUX_User_Code', code);
            localStorage.setItem('EUX_Role', role);
            closeModal('loginModal'); closeModal('deliveryLoginModal');
            goTo(page);
            if(role === 'merchant') { await loadMerchantData(code); initInteractiveMap(); }
            if(role === 'delivery') requestWakeLock();
        }

        window.logout = function() {
            if(wakeLock) wakeLock.release();
            localStorage.clear(); location.reload();
        };

        onSnapshot(query(ordersCol, orderBy("createdAt", "desc")), (snapshot) => {
            const dList = document.getElementById('ordersList');
            const mList = document.getElementById('merchantOrdersMonitor');
            const aList = document.getElementById('adminOrdersMonitor');
            const archList = document.getElementById('archivedOrdersList');
            const completedCount = document.getElementById('completedCount');
            
            if(dList) dList.innerHTML = ""; if(mList) mList.innerHTML = ""; 
            if(aList) aList.innerHTML = ""; if(archList) archList.innerHTML = "";
            
            let count = 0;
            let currentWaiting = 0;

            snapshot.forEach((docSnap) => {
                const order = docSnap.data();
                const id = docSnap.id;
                const addrHTML = order.addresses.map(a => a.startsWith('http') ? `• <a href="${a}" target="_blank">📍 خريطة</a>` : `• ${a}`).join('<br>');
                
                if (order.status === "completed") {
                    count++;
                }

                if (order.status === "waiting") {
                    currentWaiting++;
                    if(dList) {
                        dList.innerHTML += `<div class="order-card"><strong>📞 ${order.shopNum}</strong><br><a href="${order.shopLoc}" target="_blank" class="btn-gps-link">📍 موقع المحل</a><p>🏠 الوجهات:<br>${addrHTML}</p><button class="btn btn-accept-green" onclick="acceptOrder('${id}')">قبول الطلب</button></div>`;
                    }
                } else if (order.status === "delivering" && order.deliveryCode === currentUserCode) {
                    if(dList) {
                        dList.innerHTML += `<div class="order-card"><strong>📞 ${order.shopNum}</strong><br><a href="${order.shopLoc}" target="_blank" class="btn-gps-link">📍 موقع المحل</a><p>🏠 الوجهات:<br>${addrHTML}</p><button class="btn btn-finish-red" onclick="finishOrder('${id}')">إنهاء الطلب</button></div>`;
                    }
                }

                if(mList && order.merchantCode === currentUserCode && order.status !== "completed") {
                    mList.innerHTML += `<div class="monitor-item"><div><strong>${order.shopNum}</strong></div><span class="badge ${order.status}">${order.status === 'waiting' ? '⏳ انتظار' : '🚚 بالطريق'}</span></div>`;
                }
            });

            // التنبيه في الخلفية
            if (userRole === 'delivery' && lastWaitingCount !== -1 && currentWaiting > lastWaitingCount) {
                sendNotify("طلب جديد متاح! 🏍️", "يوجد طلب جديد في EUX بانتظارك.");
            }
            lastWaitingCount = currentWaiting;
            if(completedCount) completedCount.innerText = count;
        });

        // دوال مساعدة إضافية
        window.showModal = id => document.getElementById(id).style.display = 'flex';
        window.closeModal = id => document.getElementById(id).style.display = 'none';
        window.goTo = id => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
        async function loadMerchantData(c) {
            const d = await getDoc(doc(db, "users", c));
            if(d.exists()) {
                document.getElementById('shopNumber').value = d.data().phone || "";
                document.getElementById('shopLocation').value = d.data().location || "";
            }
        }
        window.acceptOrder = async id => updateDoc(doc(db, "orders", id), { status: "delivering", deliveryCode: currentUserCode });
        window.finishOrder = async id => confirm("تم التسليم؟") && updateDoc(doc(db, "orders", id), { status: "completed" });
        window.addAddressField = () => {
            const i = document.createElement('input'); i.className = 'delivery-address'; i.placeholder = 'عنوان الزبون';
            document.getElementById('addressContainer').appendChild(i);
        };
        window.confirmOrder = async () => {
            const sn = document.getElementById('shopNumber').value;
            const sl = document.getElementById('shopLocation').value;
            const ads = Array.from(document.querySelectorAll('.delivery-address')).map(i => i.value).filter(v => v);
            if(!sn || !sl || ads.length === 0) return alert("أكمل البيانات");
            await addDoc(ordersCol, { merchantCode: currentUserCode, deliveryCode: "", shopNum: sn, shopLoc: sl, addresses: ads, status: "waiting", createdAt: new Date() });
            document.getElementById('addressContainer').innerHTML = '<input type="text" class="delivery-address" placeholder="عنوان الزبون">';
            showModal('statusModal');
        };

        window.onload = () => {
            if (userRole === 'admin') goTo('adminPage');
            else if (userRole === 'merchant') { goTo('merchantPage'); loadMerchantData(currentUserCode); initInteractiveMap(); }
            else if (userRole === 'delivery') { goTo('deliveryPage'); requestWakeLock(); }
        };
    </script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f9; margin: 0; direction: rtl; }
        .screen { display: none; min-height: 100vh; padding: 20px; flex-direction: column; align-items: center; }
        .active { display: flex; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; text-align: center; margin-bottom: 20px; box-sizing: border-box; }
        h1 { color: #1a73e8; font-size: 50px; margin: 10px 0; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1.5px solid #eee; border-radius: 12px; font-size: 16px; outline: none; text-align: center; box-sizing: border-box; }
        input[readonly] { background: #f9f9f9; color: #777; border: 1px dashed #ccc; }
        .btn { cursor: pointer; border: none; border-radius: 12px; width: 100%; padding: 15px; font-weight: bold; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .btn-main { background: #1a73e8; color: white; }
        .btn-delivery { background: #34a853; color: white; }
        .btn-confirm { background: #fb8c00; color: white; }
        .btn-accept-green { background: #28a745; color: white; }
        .btn-finish-red { background: #dc3545; color: white; }
        .btn-notify { background: #673ab7; color: white; border: 2px solid #fff; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        #map { height: 200px; width: 100%; border-radius: 15px; margin: 10px 0; }
        .monitor-item { border-bottom: 1px solid #f9f9f9; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .badge { padding: 5px 10px; border-radius: 8px; font-size: 12px; }
        .waiting { background: #fff3cd; color: #856404; }
        .delivering { background: #d1ecf1; color: #0c5460; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 24px; width: 90%; max-width: 340px; text-align: center; }
        .order-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-right: 5px solid #34a853; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: right; width: 100%; }
        .btn-gps-link { color: #1a73e8; text-decoration: none; font-weight: bold; display: block; margin: 5px 0; }
        .back { margin-top: 20px; color: #888; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div id="entryPage" class="screen active" style="justify-content: center;">
        <div class="card">
            <h1>EUX</h1>
            <button class="btn btn-main" onclick="showModal('loginModal')">🏬 محل التاجر</button>
            <button class="btn btn-delivery" onclick="showModal('deliveryLoginModal')">🏍️ انا المندوب</button>
        </div>
    </div>

    <div id="loginModal" class="modal-overlay" onclick="if(event.target == this) closeModal('loginModal')">
        <div class="modal-content">
            <input type="password" id="merchantCodeInput" placeholder="كود التاجر">
            <button class="btn btn-main" onclick="loginProcess('merchant')">دخول</button>
        </div>
    </div>

    <div id="deliveryLoginModal" class="modal-overlay" onclick="if(event.target == this) closeModal('deliveryLoginModal')">
        <div class="modal-content">
            <input type="password" id="deliveryCodeInput" placeholder="كود المندوب">
            <button class="btn btn-delivery" onclick="loginProcess('delivery')">دخول</button>
        </div>
    </div>

    <div id="statusModal" class="modal-overlay" onclick="closeModal('statusModal')">
        <div class="modal-content"><h3>تم تأكيد الطلب</h3><button class="btn btn-main" onclick="closeModal('statusModal')">موافق</button></div>
    </div>

    <div id="merchantPage" class="screen">
        <div class="card">
            <h2>طلب جديد</h2>
            <input type="tel" id="shopNumber" placeholder="هاتف المحل" readonly>
            <input type="text" id="shopLocation" placeholder="موقع المحل" readonly>
            <div id="map"></div>
            <div id="addressContainer"><input type="text" class="delivery-address" placeholder="عنوان الزبون"></div>
            <button class="btn btn-main" style="font-size: 12px;" onclick="addAddressField()">➕ وجهة إضافية</button>
            <button class="btn btn-confirm" onclick="confirmOrder()">نشر الطلب</button>
            <div class="back" onclick="logout()">خروج</div>
        </div>
        <div id="merchantOrdersMonitor" style="width:100%; max-width:450px;"></div>
    </div>

    <div id="deliveryPage" class="screen">
        <div class="card">
            <h2>الطلبات المتاحة</h2>
            <button class="btn btn-notify" onclick="enableNotifications()">🔔 تفعيل صوت وتنبيه الطلبات</button>
            <button class="btn btn-main" onclick="logout()">خروج</button>
        </div>
        <div id="ordersList" style="width:100%; max-width:450px;"></div>
    </div>

    <div id="adminPage" class="screen">
        <div class="card">
            <h2>🎛️ الإدارة</h2>
            <div>✅ مكتمل: <span id="completedCount">0</span></div>
            <button class="btn btn-main" onclick="logout()">خروج</button>
        </div>
    </div>

</body>
</html>
