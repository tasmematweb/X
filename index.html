<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واجهة مبرمج محترف - تصميم موجي</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        :root { --white: #ffffff; --purple-primary: #6b46c1; --purple-secondary: #9f7aea; --purple-dark: #4c1d95; --purple-light: #e2e8f0; --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); }
        
        .weather-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; background: transparent; }
        .drop { position: absolute; background: linear-gradient(to bottom, transparent, #9f7aea); width: 2px; height: 80px; top: -100px; animation: fall linear infinite; filter: blur(1px) drop-shadow(0 0 8px #9f7aea); opacity: 0.6; }
        @keyframes fall { to { transform: translateY(110vh); } }

        body { font-family: 'Cairo', sans-serif; background: var(--white); overflow-x: hidden; padding-top: 100px; }
        
        header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); padding: 1.5rem 0; position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid var(--purple-light); }
        .header-content { display: flex; justify-content: space-between; align-items: center; max-width: 1300px; margin: 0 auto; padding: 0 20px; }

        /* التصميم الموجي المطبق تماماً كالصورة */
        .logo { 
            position: relative;
            font-size: 1.9rem; 
            font-weight: 900; 
            color: #2d1b5e; /* لون النص الداكن في الصورة */
            padding: 20px 60px;
            display: inline-block;
            z-index: 1;
        }

        .logo::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #ffffff;
            /* رسم التموجات تماماً باستخدام نقاط الـ CSS */
            clip-path: polygon(0% 15%, 15% 15%, 30% 35%, 50% 30%, 75% 45%, 100% 30%, 100% 70%, 85% 85%, 65% 70%, 45% 75%, 20% 60%, 0% 75%);
            border-radius: 20px;
            z-index: -1;
            box-shadow: inset 0 0 20px rgba(107, 70, 193, 0.05);
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        /* إضافة اللمسة الجمالية للانحناءات الجانبية */
        .logo::after {
            content: "";
            position: absolute;
            width: 10px;
            height: 40px;
            background: rgba(107, 70, 193, 0.2);
            left: 15px;
            top: 25%;
            border-radius: 50%;
            filter: blur(5px);
            z-index: -1;
        }

        nav ul { display: flex; list-style: none; gap: 40px; }
        nav a { text-decoration: none; color: #4a5568; font-weight: 600; }

        /* باقي مكونات الموقع الأساسية لضمان عمل الصفحة */
        .hero { min-height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        .hero h1 { font-size: 3.5rem; background: linear-gradient(135deg, var(--purple-primary), var(--purple-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .whatsapp-float { position: fixed; width: 60px; height: 60px; bottom: 30px; left: 30px; background: linear-gradient(135deg, var(--purple-primary), var(--purple-secondary)); color: var(--white); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; box-shadow: var(--shadow); z-index: 1000; text-decoration: none; }
        
        footer { background: var(--purple-dark); color: var(--white); padding: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="weather-layer"><div id="rainContainer"></div></div>
    
    <header>
        <div class="header-content">
            <div class="logo">تصميمات ويب</div>
            <nav>
                <ul>
                    <li><a href="#">الرئيسية</a></li>
                    <li><a href="#">الخدمات</a></li>
                    <li><a href="#">تواصل معنا</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div>
            <h1>نحول أفكارك الرقمية إلى واقع</h1>
            <p style="margin-top: 20px; color: #4a5568; font-size: 1.2rem;">حلول برمجية احترافية بتصاميم عصرية</p>
        </div>
    </section>

    <div style="position: fixed; bottom: 30px; left: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 1000;">
        <a href="https://www.instagram.com/tasmematweb?igsh=MWl4enptZzJibDNyNw==" class="whatsapp-float" target="_blank" style="position: static;"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/201119024874" class="whatsapp-float" target="_blank" style="position: static;"><i class="fab fa-whatsapp"></i></a>
    </div>

    <footer><p>جميع الحقوق محفوظة &copy; 2026 | تصميمات ويب</p></footer>

    <script>
        function initRain() { 
            const container = document.getElementById('rainContainer'); 
            for (let i = 0; i < 35; i++) { 
                const drop = document.createElement('div'); 
                drop.className = 'drop'; 
                drop.style.left = Math.random() * 100 + 'vw'; 
                drop.style.animationDuration = (Math.random() * 2 + 3) + 's'; 
                container.appendChild(drop); 
            } 
        }
        initRain();
    </script>
</body>
</html>
